<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>To-Do List</title>
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/128/9717/9717679.png"type="image/x-icon">
</head>
<body>

  <div class="container"><button onclick="resetAll()" id="resetbtn"></button>
    <h1>To-Do List</h1>
    
    <div class="header">
      <h2><span id="date"></span></h2>
      <input type="text" id="task" placeholder="Add task" onkeydown="if(event.key==='Enter') addTask()">
      <button onclick="addTask()" id="addbtn"></button>
      
    </div>
    <div id="todo-list">
    </div>
  </div>
  <script src="script.js"></script>
